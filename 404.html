<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | GazitHUB Trade</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0B1F3A">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .not-found-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--bg);
      padding: 40px 20px;
    }

    .not-found-content {
      max-width: 600px;
    }

    .not-found-content h1 {
      font-size: 120px;
      color: var(--gold);
      margin-bottom: 20px;
      line-height: 1;
    }

    .not-found-content h2 {
      font-size: 32px;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .not-found-content p {
      color: var(--slate);
      font-size: 18px;
      margin-bottom: 40px;
    }
  </style>
</head>

<body>
  <main id="main">
    <section class="not-found-section">
      <div class="container not-found-content">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you are looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn btn-gold btn-lg">Return to Homepage</a>
      </div>
    </section>
  </main>
</body>

</html>
